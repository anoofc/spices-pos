<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-container {
            max-width: 600px;
            margin: 20px auto;
            background: #2c2c2c;
            padding: 20px;
            border-radius: 10px;
        }

        .search-container h2 {
            margin-top: 0;
        }

        .search-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-group input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .search-group button {
            width: auto;
            height: auto;
            padding: 10px 20px;
        }

        .invoices-list {
            max-width: 900px;
            margin: 20px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #2c2c2c;
            margin-top: 10px;
        }

        table th {
            background: #ff6b00;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #444;
        }

        table tr:hover {
            background: #3a3a3a;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            width: auto;
            height: auto;
            padding: 6px 12px;
            font-size: 12px;
        }

        .view-btn {
            background: #3366ff;
        }

        .view-btn:hover {
            background: #5588ff;
        }

        .print-btn {
            background: #2a7a2a;
        }

        .print-btn:hover {
            background: #3d9e3d;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }

        .sort-container {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 15px 0;
            background: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .sort-container label {
            font-weight: bold;
            color: #fff;
        }

        .sort-btn {
            padding: 8px 15px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }

        .sort-btn:hover {
            background: #555;
        }

        .sort-btn.active {
            background: #ff6b00;
        }

        .delete-btn {
            background: #cc3333;
        }

        .delete-btn:hover {
            background: #ff3333;
        }

        .invoice-detail {
            max-width: 700px;
            margin: 20px auto;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
        }

        .invoice-header {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .invoice-header h1 {
            margin: 0;
            font-size: 24px;
        }

        .invoice-header p {
            margin: 5px 0;
            color: #666;
        }

        .invoice-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }

        .invoice-info-col {
            flex: 1;
        }

        .invoice-info-col strong {
            display: block;
            color: #333;
        }

        .invoice-items {
            margin: 20px 0;
        }

        .invoice-items table {
            background: white;
            border-collapse: collapse;
            width: 100%;
        }

        .invoice-items th {
            background: #f5f5f5;
            border-bottom: 2px solid #333;
            padding: 10px;
            text-align: left;
            color: black;
        }

        .invoice-items td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            color: black;
        }

        .invoice-summary {
            margin-top: 20px;
            border-top: 2px solid #333;
            padding-top: 15px;
            text-align: right;
        }

        .invoice-summary .total-row {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .print-buttons {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .print-buttons button {
            width: auto;
            height: auto;
            padding: 10px 20px;
            margin: 5px;
        }

        @media print {
            body {
                margin: 0;
                padding: 0;
                background: white;
            }

            .search-container,
            .invoices-list,
            .print-buttons,
            header {
                display: none;
            }

            .invoice-detail {
                max-width: 100%;
                margin: 0;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Invoices</h1>
        <button onclick="goHome()">🏠 Home</button>
    </header>

    <div id="invoicesList">
        <div class="search-container">
            <h2>Search Invoices</h2>
            <div class="search-group">
                <input type="text" id="searchInvoice" placeholder="Search by invoice number..." onkeyup="searchInvoices()">
                <button onclick="resetSearch()">Clear</button>
            </div>
            <div class="search-group">
                <label>From Date:</label>
                <input type="date" id="fromDate" onchange="filterByDateRange()">
                <label>To Date:</label>
                <input type="date" id="toDate" onchange="filterByDateRange()">
                <button onclick="resetDateFilter()">Reset</button>
            </div>
        </div>

        <div class="invoices-list">
            <h2>Daily Sales Records</h2>
            <div class="sort-container">
                <label>Sort by:</label>
                <button class="sort-btn active" onclick="sortInvoices('date')">📅 Date (Newest)</button>
                <button class="sort-btn" onclick="sortInvoices('amount')">💰 Amount</button>
                <button class="sort-btn" onclick="sortInvoices('invoice')">🔢 Invoice #</button>
            </div>
            <div id="invoicesTable"></div>
        </div>
    </div>

    <div id="invoiceDetailView" style="display: none;"></div>

    <script src="js/database.js"></script>
    <script src="js/invoices.js"></script>

</body>

</html>
